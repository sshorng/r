name: Sync Sheets Data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Fetch and convert data
        run: |
          curl -s "https://docs.google.com/spreadsheets/d/1OHdNUk4C9CvsKV1rfsrbeSFBplpEI5Ga8BiFOWPGit4/export?format=csv&gid=0" > /tmp/data.csv
          node -e "
            const fs = require('fs');
            const csv = fs.readFileSync('/tmp/data.csv', 'utf-8');
            const lines = csv.trim().split('\n');
            const result = [];
            for (let i = 1; i < lines.length; i++) {
              const cols = lines[i].split(',');
              const code = cols[0] ? cols[0].trim() : '';
              const url  = cols[1] ? cols[1].trim() : '';
              if (code) result.push({ code, url });
            }
            fs.writeFileSync('data.json', JSON.stringify(result, null, 2));
          "
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "sync sheets data"
          git push
