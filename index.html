<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阿墨轉址</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1a1f35 100%);
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container { max-width: 960px; margin: 0 auto; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .header h1 {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.5rem;
      color: #f1f5f9;
      letter-spacing: 0.5px;
    }
    .header h1 span { color: #38bdf8; }
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .card-header {
      padding: 1rem 1.5rem;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid #2d3a50;
    }
    .card-header p {
      color: #94a3b8;
      font-size: 0.85rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 0;
    }
    th, td {
      padding: 0.9rem 1rem;
      text-align: left;
      border-bottom: 1px solid #2d3a50;
      vertical-align: middle;
    }
    th {
      color: #38bdf8;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      background: rgba(56,189,248,0.03);
    }
    .url-cell {
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    a {
      color: #7dd3fc;
      text-decoration: none;
    }
    a:hover { color: #38bdf8; }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      justify-content: center;
      align-items: stretch;
    }
    .btn-small {
      padding: 0.25rem 0.5rem;
      font-size: 0.7rem;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 500;
      line-height: 1.4;
    }
    .btn-qr {
      background: #38bdf8;
      color: #0f172a;
    }
    .btn-qr:hover { background: #7dd3fc; }
    .btn-copy {
      background: #334155;
      color: #cbd5e1;
    }
    .btn-copy:hover { background: #475569; color: #f1f5f9; }
    .btn-sheet {
      background: #1e293b;
      color: #38bdf8;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 10px;
      font-weight: 500;
      font-size: 0.85rem;
      border: 1px solid #2d3a50;
    }
    .btn-sheet:hover { border-color: #38bdf8; text-decoration: none; }
    .loading {
      text-align: center;
      color: #94a3b8;
      padding: 3rem 2rem;
      font-size: 0.9rem;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      z-index: 100;
      padding: 1rem;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #1e293b;
      padding: 2rem;
      border-radius: 16px;
      text-align: center;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    }
    .modal-content h2 {
      color: #f1f5f9;
      margin-bottom: 0.5rem;
    }
    .modal-content img {
      width: 200px;
      height: 200px;
      background: white;
      padding: 8px;
      border-radius: 8px;
      margin: 1rem 0;
    }
    .modal-content p { margin: 0.5rem 0; color: #94a3b8; font-size: 0.85rem; }
    .short-url {
      font-size: 1rem;
      color: #38bdf8;
      word-break: break-all;
      background: #0f172a;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      margin: 0.5rem 0;
      border: 1px solid #2d3a50;
    }
    .modal-actions {
      margin-top: 1rem;
      display: flex;
      gap: 0.8rem;
      justify-content: center;
    }
    .empty-msg {
      text-align: center;
      padding: 2rem;
      color: #64748b;
      font-size: 0.9rem;
    }
    .qr-cell { text-align: center; }
    .qr-cell img {
      display: inline-block;
      vertical-align: middle;
    }
    @media (max-width: 640px) {
      body { padding: 1rem 0.5rem; }
      .header { flex-direction: column; gap: 1rem; align-items: flex-start; }
      th, td { padding: 0.7rem 0.5rem; font-size: 0.8rem; }
      .url-cell { max-width: 120px; }
    }
    .toast {
      display: none;
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: #22c55e;
      color: #fff;
      padding: 0.5rem 1.5rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      z-index: 200;
    }
    .toast.show {
      display: block;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(1rem); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><span>⇢</span> 阿墨轉址</h1>
      <a href="https://docs.google.com/spreadsheets/d/1OHdNUk4C9CvsKV1rfsrbeSFBplpEI5Ga8BiFOWPGit4/edit" target="_blank" class="btn-sheet">
        開啟 Google Sheets
      </a>
    </div>

    <div class="card">
      <div class="card-header">
        <p>在 Google Sheets 中新增短碼，這裡會自動同步顯示</p>
      </div>
      <div id="loading" class="loading">載入中 ...</div>
      <table id="table" style="display: none;">
        <thead>
          <tr>
            <th style="width:15%">短碼</th>
            <th>目標網址</th>
            <th>轉址網址</th>
            <th style="width:15%">QR Code</th>
            <th style="width:10%">操作</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2 id="modalTitle"></h2>
      <img id="modalQR" src="">
      <div class="short-url" id="modalUrl"></div>
      <div class="modal-actions">
        <button class="btn-small btn-copy" onclick="copyUrl()" style="padding:0.5rem 1rem;font-size:0.85rem">複製網址</button>
        <button class="btn-small btn-qr" onclick="closeModal()" style="padding:0.5rem 1rem;font-size:0.85rem">關閉</button>
      </div>
    </div>
  </div>

  <script>
    var SHEETS_ID = "1OHdNUk4C9CvsKV1rfsrbeSFBplpEI5Ga8BiFOWPGit4";
    var BASE_URL = "https://sshorng.github.io/r/";
    var allData = [];

    function getQRUrl(url) {
      return "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(url);
    }

    function parseCSV(text) {
      var lines = text.split("\n");
      var result = [];
      for (var i = 1; i < lines.length; i++) {
        var cols = lines[i].split(",");
        var code = cols[0] ? cols[0].trim() : "";
        var url = cols[1] ? cols[1].trim() : "";
        if (code) {
          result.push({ code: code, url: url });
        }
      }
      return result;
    }

    async function loadData() {
      try {
        var timestamp = new Date().getTime();
        var url = "https://docs.google.com/spreadsheets/d/" + SHEETS_ID + "/export?format=csv&gid=0&_=" + timestamp;
        var response = await fetch(url);
        var text = await response.text();
        allData = parseCSV(text);
        renderTable();
      } catch (err) {
        document.getElementById("loading").textContent = "載入失敗，請確認 Sheets 已設為公開";
      }
    }

    function renderTable() {
      var tbody = document.getElementById("tableBody");
      tbody.innerHTML = "";

      if (allData.length === 0) {
        tbody.innerHTML = "<tr><td colspan='5' class='empty-msg'>尚無資料，請到 Google Sheets 新增短碼</td></tr>";
      }

      allData.forEach(function(item) {
        var shortUrl = BASE_URL + item.code;
        var qrUrl = getQRUrl(shortUrl);
        var row = document.createElement("tr");
        row.innerHTML =
          "<td><strong>" + item.code + "</strong></td>" +
          "<td class='url-cell'><a href='" + item.url + "' target='_blank' title='" + item.url + "'>" + item.url + "</a></td>" +
          "<td class='url-cell'><a href='" + shortUrl + "' target='_blank'>" + shortUrl + "</a></td>" +
          "<td class='qr-cell'><img src='" + qrUrl + "' width='70' height='70' style='background:#fff;padding:3px;border-radius:4px'></td>" +
          "<td>" +
          "<div class='actions'>" +
          "<button class='btn-small btn-qr' onclick='showQRForCode(\"" + item.code + "\")'>QR</button>" +
          "<button class='btn-small btn-copy' onclick='copyShortUrl(\"" + item.code + "\")'>複製</button>" +
          "</div></td>";
        tbody.appendChild(row);
      });

      document.getElementById("loading").style.display = "none";
      document.getElementById("table").style.display = "table";
    }

    function showQRForCode(code) {
      var shortUrl = BASE_URL + code;
      document.getElementById("modalTitle").textContent = code;
      document.getElementById("modalQR").src = getQRUrl(shortUrl);
      document.getElementById("modalUrl").textContent = shortUrl;
      document.getElementById("modal").classList.add("active");
    }

    function showToast() {
      var t = document.getElementById("toast");
      t.className = "toast show";
      setTimeout(function() { t.className = "toast"; }, 1500);
    }

    function copyShortUrl(code) {
      var shortUrl = BASE_URL + code;
      navigator.clipboard.writeText(shortUrl);
      showToast();
    }

    function copyUrl() {
      var url = document.getElementById("modalUrl").textContent;
      navigator.clipboard.writeText(url);
    }

    function closeModal() {
      document.getElementById("modal").classList.remove("active");
    }

    loadData();
  </script>
</body>
</html>
