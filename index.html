<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>頁面跳轉中...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #334155;
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .message {
      color: #94a3b8;
      font-size: 0.9rem;
    }
    .error {
      color: #f87171;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <p class="message" id="message">頁面跳轉中，請稍候...</p>
    <p class="error" id="error"></p>
  </div>

  <script>
    // ===== 在這裡填入你的 GAS Web App 網址 =====
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzpnzQFfIvt2z9y-ibVcinHujiHBSH913QsK82OF3PSnOjcHtHR-36dGwiWFXoHPMmK/exec";

    // 從網址列取得短碼（支援 /r/math101 或 ?code=math101 格式）
    function getCode() {
      const path = window.location.pathname;
      const match = path.match(/\/r\/([^\/]+)/);
      if (match) return decodeURIComponent(match[1]);

      const params = new URLSearchParams(window.location.search);
      return params.get("code") || "";
    }

    // 顯示錯誤
    function showError(msg) {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("message").style.display = "none";
      const errorEl = document.getElementById("error");
      errorEl.textContent = msg;
      errorEl.style.display = "block";
    }

    // 主程式
    async function redirect() {
      const code = getCode();

      if (!code) {
        showError("找不到短碼，請確認網址正確");
        return;
      }

      if (!GAS_URL) {
        showError("系統未設定，請聯繫管理員");
        return;
      }

      try {
        // 呼叫 GAS API
        const response = await fetch(`${GAS_URL}?action=getUrl&code=${encodeURIComponent(code)}`);
        const html = await response.text();

        // GAS 直接回傳跳轉 HTML，用 iframe 解析
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");
        const script = doc.querySelector("script");

        if (script && script.textContent.includes("window.top.location.href")) {
          // 提取 URL 並跳轉
          const urlMatch = script.textContent.match(/window\.top\.location\.href="([^"]+)"/);
          if (urlMatch) {
            window.top.location.href = urlMatch[1];
            return;
          }
        }

        // 如果回傳 JSON 錯誤
        try {
          const json = JSON.parse(html);
          showError(json.error || "找不到對應的網址");
        } catch {
          showError("回應格式錯誤，請聯繫管理員");
        }
      } catch (err) {
        showError("連線失敗，請稍後再試");
        console.error(err);
      }
    }

    redirect();
  </script>
</body>
</html>
