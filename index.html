<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code 轉址管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    h1 { color: #38bdf8; }
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid #334155;
    }
    th { color: #38bdf8; font-size: 0.875rem; }
    .url-cell {
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    a {
      color: #38bdf8;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .actions { display: flex; gap: 0.5rem; }
    .btn-small {
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }
    .btn-qr { background: #38bdf8; color: #0f172a; }
    .btn-copy { background: #334155; color: #e2e8f0; }
    .btn-copy:hover { background: #475569; }
    .btn-sheet {
      background: #22c55e;
      color: #fff;
      text-decoration: none;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-weight: 500;
    }
    .btn-sheet:hover { background: #16a34a; text-decoration: none; }
    .loading { text-align: center; color: #94a3b8; padding: 2rem; }
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #1e293b;
      padding: 2rem;
      border-radius: 12px;
      text-align: center;
    }
    .modal-content img {
      width: 200px;
      height: 200px;
      background: white;
      padding: 8px;
      border-radius: 8px;
      margin: 1rem 0;
    }
    .modal-content p { margin: 0.5rem 0; color: #94a3b8; }
    .short-url {
      font-size: 1.1rem;
      color: #38bdf8;
      word-break: break-all;
      background: #0f172a;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      margin: 0.5rem 0;
    }
    .modal-actions { margin-top: 1rem; display: flex; gap: 1rem; justify-content: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>QR Code 轉址管理</h1>
      <a href="https://docs.google.com/spreadsheets/d/1OHdNUk4C9CvsKV1rfsrbeSFBplpEI5Ga8BiFOWPGit4/edit" target="_blank" class="btn-sheet">
        開啟 Google Sheets
      </a>
    </div>

    <div class="card">
      <div id="loading" class="loading">載入中...</div>
      <table id="table" style="display: none;">
        <thead>
          <tr>
            <th>短碼</th>
            <th>目標網址</th>
            <th>轉址網址</th>
            <th class="qr-cell">QR Code</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <h2 id="modalTitle"></h2>
      <img id="modalQR" src="">
      <div class="short-url" id="modalUrl"></div>
      <p>掃描 QR Code 或複製上方網址</p>
      <div class="modal-actions">
        <button class="btn-small btn-copy" onclick="copyUrl()">複製網址</button>
        <button class="btn-small btn-qr" onclick="closeModal()">關閉</button>
      </div>
    </div>
  </div>

  <script>
    var SHEETS_ID = "1OHdNUk4C9CvsKV1rfsrbeSFBplpEI5Ga8BiFOWPGit4";
    var BASE_URL = "https://sshorng.github.io/r/";
    var allData = [];

    function getQRUrl(url) {
      return "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(url);
    }

    async function loadData() {
      try {
        var url = "https://docs.google.com/spreadsheets/d/" + SHEETS_ID + "/gviz/tq?tqx=out:json&tq=SELECT%20A%2C%20B";
        var response = await fetch(url);
        var text = await response.text();
        var json = JSON.parse(text.substring(47, text.length - 2));
        var rows = json.table.rows;

        allData = [];
        for (var i = 0; i < rows.length; i++) {
          var shortCode = rows[i].c[0] ? String(rows[i].c[0].v) : "";
          var targetUrl = rows[i].c[1] ? String(rows[i].c[1].v) : "";
          if (shortCode) {
            allData.push({ code: shortCode, url: targetUrl });
          }
        }

        renderTable();
      } catch (err) {
        document.getElementById("loading").textContent = "載入失敗，請確認 Sheets 已設為公開";
        console.error(err);
      }
    }

    function renderTable() {
      var tbody = document.getElementById("tableBody");
      tbody.innerHTML = "";

      allData.forEach(function(item) {
        var shortUrl = BASE_URL + item.code;
        var qrUrl = getQRUrl(shortUrl);
        var row = document.createElement("tr");
        row.innerHTML =
          "<td><strong>" + item.code + "</strong></td>" +
          "<td class='url-cell'><a href='" + item.url + "' target='_blank' title='" + item.url + "'>" + item.url + "</a></td>" +
          "<td class='url-cell'><a href='" + shortUrl + "' target='_blank'>" + shortUrl + "</a></td>" +
          "<td style='text-align:center'><img src='" + qrUrl + "' width='80' height='80' style='background:#fff;padding:4px;border-radius:4px'></td>" +
          "<td class='actions'>" +
          "<button class='btn-small btn-qr' onclick='showQRForCode(\"" + item.code + "\")'>放大</button>" +
          "<button class='btn-small btn-copy' onclick='copyShortUrl(\"" + item.code + "\")'>複製</button>" +
          "</td>";
        tbody.appendChild(row);
      });

      document.getElementById("loading").style.display = "none";
      document.getElementById("table").style.display = "table";
    }

    function showQRForCode(code) {
      var shortUrl = BASE_URL + code;
      document.getElementById("modalTitle").textContent = code;
      document.getElementById("modalQR").src = getQRUrl(shortUrl);
      document.getElementById("modalUrl").textContent = shortUrl;
      document.getElementById("modal").classList.add("active");
    }

    function copyShortUrl(code) {
      var shortUrl = BASE_URL + code;
      navigator.clipboard.writeText(shortUrl).then(function() {
        alert("已複製：" + shortUrl);
      });
    }

    function copyUrl() {
      var url = document.getElementById("modalUrl").textContent;
      navigator.clipboard.writeText(url).then(function() {
        alert("已複製！");
      });
    }

    function closeModal() {
      document.getElementById("modal").classList.remove("active");
    }

    loadData();
  </script>
</body>
</html>
